<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营业受理机器人</title>
    <style>
        :root {
            --primary-red: #D32F2F;
            --light-gray: #E0E0E0;
            --input-gray: #9E9E9E;
            --placeholder-gray: #757575;
            --link-blue: #1976D2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F5F5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 40px);
        }

        /* 头部 */
        .header {
            background: #FFFFFF;
            border-bottom: 1px solid var(--light-gray);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .header-title-area h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-red);
        }

        .status-badge {
            font-size: 12px;
            color: var(--input-gray);
            margin-top: 2px;
        }

        .status-badge.authenticated {
            color: var(--primary-red);
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .header-actions button {
            background: none;
            border: none;
            color: var(--link-blue);
            padding: 6px 10px;
            cursor: pointer;
            font-size: 13px;
        }

        .lang-select {
            background: none;
            border: 1px solid var(--light-gray);
            color: #333;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .lang-select option {
            color: #333;
            background: white;
        }

        /* 聊天区域 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            justify-content: flex-start;
            align-items: flex-start;
        }

        .message.user {
            justify-content: flex-end;
            align-items: flex-end;
        }

        .message-content {
            max-width: 85%;
            padding: 12px 14px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.bot .message-content {
            background: #F5F5F5;
            color: #333;
            border-radius: 4px;
            border: 1px solid var(--light-gray);
        }

        .message.user .message-content {
            background: #95EC69;
            color: #333;
            border-radius: 4px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.bot .avatar {
            background: var(--input-gray);
            color: white;
            margin-right: 8px;
        }

        .message.user .avatar {
            background: var(--primary-red);
            color: white;
            margin-left: 8px;
        }

        .message.bot .message-wrap {
            display: flex;
            align-items: flex-start;
        }

        .message.user .message-wrap {
            display: flex;
            align-items: flex-end;
        }

        /* 输入区域 */
        .input-area {
            padding: 16px;
            background: #FFFFFF;
            border-top: 1px solid var(--light-gray);
        }

        .input-wrapper {
            display: flex;
            gap: 0;
            border: 1px solid var(--light-gray);
            border-radius: 4px;
            overflow: hidden;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px 14px;
            border: none;
            font-size: 14px;
            outline: none;
            background: #FAFAFA;
        }

        .input-wrapper input::placeholder {
            color: var(--placeholder-gray);
        }

        .input-wrapper input:focus {
            background: #FFFFFF;
        }

        .send-btn {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #B71C1C;
        }

        .send-btn:disabled {
            background: var(--input-gray);
            cursor: not-allowed;
        }

        /* 快捷操作 */
        .quick-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .quick-action {
            padding: 8px 14px;
            background: #FFFFFF;
            border: 1px solid var(--light-gray);
            border-radius: 4px;
            font-size: 13px;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-action:hover {
            border-color: var(--primary-red);
            color: var(--primary-red);
        }

        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--input-gray);
            font-size: 12px;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background: var(--input-gray);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 4px;
            width: 90%;
            max-width: 360px;
            border: 1px solid var(--light-gray);
        }

        .modal-content h3 {
            margin-bottom: 16px;
            color: #333;
            font-size: 16px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--light-gray);
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 12px;
            background: #FAFAFA;
        }

        .modal-content input:focus {
            outline: none;
            border-color: var(--primary-red);
            background: #FFFFFF;
        }

        .modal-content .btn-group {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-content button {
            padding: 10px 20px;
            border: 1px solid var(--light-gray);
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            background: #FFFFFF;
        }

        .modal-content .btn-cancel {
            color: #666;
        }

        .modal-content .btn-confirm {
            background: var(--primary-red);
            color: white;
            border-color: var(--primary-red);
        }

        .modal-content .btn-confirm:hover {
            background: #B71C1C;
        }

        /* 产品卡片 */
        .product-card {
            background: #FFFFFF;
            border: 1px solid var(--light-gray);
            border-radius: 4px;
            padding: 16px;
            margin: 8px 0;
        }

        .product-card h4 {
            color: #333;
            margin-bottom: 8px;
        }

        .product-card p {
            color: #666;
            font-size: 13px;
            margin: 4px 0;
        }

        .product-card .price {
            color: var(--primary-red);
            font-size: 18px;
            font-weight: 600;
            margin-top: 8px;
        }

        /* 订单卡片 */
        .order-card {
            background: #FFFFFF;
            border: 1px solid var(--light-gray);
            border-radius: 4px;
            padding: 16px;
            margin: 8px 0;
            border-left: 3px solid var(--primary-red);
        }

        .order-card.completed {
            border-left-color: #4CAF50;
        }

        .order-card.pending {
            border-left-color: #FF9800;
        }

        .order-card.error {
            border-left-color: #F44336;
        }

        .order-card h4 {
            color: #333;
            margin-bottom: 8px;
        }

        .order-card p {
            color: #666;
            font-size: 13px;
            margin: 4px 0;
        }

        .order-card .status {
            margin-top: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .order-card .status.pending {
            color: #FF9800;
        }

        .order-card .status.completed {
            color: #4CAF50;
        }

        .order-card .status.error {
            color: #F44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <img src="hua.png" alt="华为">
                <div class="header-title-area">
                    <h1 id="headerTitle">营业受理机器人</h1>
                    <span id="statusBadge" class="status-badge" data-i18n="unauthenticated">未认证</span>
                </div>
            </div>
            <div class="header-actions">
                <select id="langSelect" class="lang-select" onchange="changeLanguage(this.value)">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                </select>
                <button onclick="clearHistory()" data-i18n="clearHistory">清除历史</button>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message bot">
                <div class="message-wrap">
                    <div class="avatar">🤖</div>
                    <div class="message-content" id="welcomeMessage">
                        🤖 欢迎使用CRM营业受理服务！

为了提供个性化服务，请先完成身份验证。

请输入手机号和密码登录：
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="quick-actions" id="quickActions">
                <button class="quick-action" onclick="sendMessage(i18n.get('query5g'))" data-i18n="query5g">📱 5G套餐</button>
                <button class="quick-action" onclick="sendMessage(i18n.get('recommend'))" data-i18n="recommend">⭐ 推荐</button>
                <button class="quick-action" onclick="sendMessage(i18n.get('queryOrder'))" data-i18n="queryOrder">📋 订单</button>
            </div>
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="请输入消息..." data-i18n-placeholder="inputPlaceholder" onkeypress="handleKeyPress(event)">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="white"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div class="modal" id="codeModal">
        <div class="modal-content">
            <h3 data-i18n="enterPassword">登录认证</h3>
            <input type="text" id="phoneInput" placeholder="手机号" data-i18n-placeholder="phonePlaceholder" style="margin-bottom: 8px;">
            <input type="password" id="codeInput" placeholder="服务密码" data-i18n-placeholder="passwordPlaceholder" maxlength="20">
            <div class="btn-group">
                <button class="btn-cancel" onclick="closeModal('codeModal')" data-i18n="cancel">取消</button>
                <button class="btn-confirm" onclick="submitCode()" data-i18n="login">登录</button>
            </div>
        </div>
    </div>

    <script>
        // 国际化配置
        const i18n = {
            currentLang: 'zh',
            translations: {
                zh: {
                    headerTitle: '营业受理机器人',
                    unauthenticated: '未认证',
                    authenticated: '已认证',
                    clearHistory: '清除历史',
                    welcomeMessage: '🤖 欢迎使用营业受理机器人！\n\n我可以为您提供以下服务：\n\n📦 产品查询 - 了解各类套餐\n📋 订单查询 - 查看办理记录\n💬 人工客服 - 转接人工服务\n\n您可以直接输入您想了解的内容。\n\n💡 提示：订购产品或查询订单需要先登录\n\n请先输入您想了解的产品（如：5G套餐）或直接说\'登录\'完成身份验证',
                    query5g: '我想查询5G套餐',
                    recommend: '推荐',
                    queryOrder: '查询订单',
                    inputPlaceholder: '请输入消息...',
                    phonePlaceholder: '手机号',
                    passwordPlaceholder: '服务密码',
                    enterPassword: '登录认证',
                    cancel: '取消',
                    login: '登录',
                    send: '发送',
                    loading: '正在处理...',
                    authFailed: '登录失败，请检查手机号和密码后重试。',
                    error: '抱歉，处理您的请求时发生错误。请稍后重试。',
                    networkError: '网络错误，请检查连接后重试。',
                    passwordRequired: '请输入服务密码',
                    historyCleared: '🤖 历史记录已清除。\n\n请输入手机号+空格+密码进行登录（如：15300000574 Tianyuan@410）',
                    authenticatedMsg: '已认证',
                    nameAuthenticated: '{name} 已认证'
                },
                en: {
                    headerTitle: 'Service Robot',
                    unauthenticated: 'Not Verified',
                    authenticated: 'Verified',
                    clearHistory: 'Clear History',
                    welcomeMessage: '🤖 Welcome to Service Robot!\n\nI can help you with:\n\n📦 Product Inquiry - Browse our plans\n📋 Order Query - View your orders\n💬 Live Agent - Connect to human support\n\nYou can ask me anything about our products.\n\n💡 Note: Ordering products or checking orders requires login.\n\nEnter a product (e.g., 5G plans) or say \'login\' to authenticate',
                    query5g: 'I want to check 5G plans',
                    recommend: 'Recommend',
                    queryOrder: 'Query Order',
                    inputPlaceholder: 'Enter message...',
                    phonePlaceholder: 'Phone number',
                    passwordPlaceholder: 'Service password',
                    enterPassword: 'Login',
                    cancel: 'Cancel',
                    login: 'Login',
                    send: 'Send',
                    loading: 'Processing...',
                    authFailed: 'Login failed, please check your phone number and password and try again.',
                    error: 'Sorry, an error occurred while processing your request. Please try again later.',
                    networkError: 'Network error, please check your connection and try again.',
                    passwordRequired: 'Please enter service password',
                    historyCleared: '🤖 History cleared.\n\nPlease enter phone number+space+password to login (e.g., 15300000574 Tianyuan@410)',
                    authenticatedMsg: 'Verified',
                    nameAuthenticated: '{name} Verified'
                },
fr: {
                    headerTitle: 'Robot de Service',
                    unauthenticated: 'Non vérifié',
                    authenticated: 'Vérifié',
                    clearHistory: 'Effacer',
                    welcomeMessage: '🤖 Bienvenue sur le Robot de Service !\n\nJe peux vous aider avec :\n\n📦 Consultation - Voir nos forfaits\n📋 Commandes - Voir vos commandes\n💬 Agent humain - Contacter un conseiller\n\nVous pouvez meposer des questions sur nos produits.\n\n💡 Note: Commander ou voir vos commandes nécessite une connexion.\n\nEntrez un produit (ex: forfaits 5G) ou dites \'connexion\' pour vous authentifier',
                    query5g: 'Je veux voir les forfaits 5G',
                    recommend: 'Recommander',
                    queryOrder: 'Consulter commande',
                    inputPlaceholder: 'Entrez un message...',
                    phonePlaceholder: 'Numéro de téléphone',
                    passwordPlaceholder: 'Mot de passe',
                    enterPassword: 'Connexion',
                    cancel: 'Annuler',
                    login: 'Connexion',
                    send: 'Envoyer',
                    loading: 'Traitement...',
                    authFailed: 'Échec de connexion, Veuillez vérifier votre numéro de téléphone et mot de passe.',
                    error: 'Désolé, une erreur s\'est produite lors du traitement de votre demande. Veuillez réessayer plus tard.',
                    networkError: 'Erreur réseau, Veuillez vérifier votre connexion.',
                    passwordRequired: 'Veuillez entrer le mot de passe',
                    historyCleared: '🤖 Historique effacé.\n\nVeuillez entrer numéro+espace+mot de passe pour vous connecter (ex: 15300000574 Tianyuan@410)',
                    authenticatedMsg: 'Vérifié',
                    nameAuthenticated: '{name} Vérifié'
                }
            },
            get: function(key) {
                return this.translations[this.currentLang][key] || key;
            },
            set: function(lang) {
                if (this.translations[lang]) {
                    this.currentLang = lang;
                    this.updateUI();
                }
            },
            updateUI: function() {
                document.getElementById('headerTitle').textContent = this.get('headerTitle');
                
                const elements = document.querySelectorAll('[data-i18n]');
                elements.forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    el.textContent = this.get(key);
                });

                const placeholderElements = document.querySelectorAll('[data-i18n-placeholder]');
                placeholderElements.forEach(el => {
                    const key = el.getAttribute('data-i18n-placeholder');
                    el.placeholder = this.get(key);
                });

                const badge = document.getElementById('statusBadge');
                if (badge.classList.contains('authenticated')) {
                    badge.textContent = this.get('authenticatedMsg');
                } else {
                    badge.textContent = this.get('unauthenticated');
                }

                const welcomeEl = document.getElementById('welcomeMessage');
                if (welcomeEl) {
                    welcomeEl.textContent = this.get('welcomeMessage');
                }
            }
        };

        // 状态管理
        let sessionId = '';
        let isAuthenticated = false;
        let currentPhone = '';

        // 初始化
        async function init() {
            await createSession();
        }

        // 创建会话
        async function createSession() {
            try {
                const response = await fetch('/api/session/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                sessionId = data.session_id;
            } catch (error) {
                console.error('创建会话失败:', error);
                sessionId = 'session_' + Date.now();
            }
        }

        // 发送消息
        async function sendMessage(message) {
            const input = document.getElementById('messageInput');
            const messageText = message || input.value.trim();

            if (!messageText) return;

            // 显示用户消息
            addMessage(messageText, 'user');
            input.value = '';

            // 显示加载状态
            showLoading();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: messageText,
                        language: i18n.currentLang
                    })
                });

                const data = await response.json();

                // 移除加载状态
                removeLoading();

                // 处理登录失败
                if (data.type === 'auth_failed') {
                    addMessage(data.message || i18n.get('authFailed'), 'bot');
                    return;
                }

                if (data.success) {
                    // 显示机器人回复
                    addMessage(data.message, 'bot');

                    // 弹出登录窗口（auth_password 或 auth_required）
                    if (data.type === 'auth_password' || data.type === 'auth_required') {
                        currentPhone = data.data?.phone || '';
                        document.getElementById('codeModal').classList.add('show');
                        document.getElementById('codeInput').focus();
                    }

                    // 更新认证状态
                    if (data.type === 'auth_success') {
                        isAuthenticated = true;
                        updateStatus(true, data.data?.customer?.name);
                    }
                } else {
                    addMessage(i18n.get('error'), 'bot');
                }
            } catch (error) {
                removeLoading();
                console.error('发送消息失败:', error);
                addMessage(i18n.get('networkError'), 'bot');
            }
        }

        // 提交登录信息
        async function submitCode() {
            const phone = document.getElementById('phoneInput').value.trim();
            const pwd = document.getElementById('codeInput').value.trim();
            
            if (!phone || phone.length !== 11) {
                alert('请输入正确的手机号');
                return;
            }
            if (!pwd || pwd.length < 6) {
                alert(i18n.get('passwordRequired'));
                return;
            }

            closeModal('codeModal');
            // 发送手机号+密码格式
            const fullMsg = phone + ' ' + pwd;
            await sendMessage(fullMsg);
        }

        // 添加消息到聊天区域
        function addMessage(text, type) {
            const chatArea = document.getElementById('chatArea');
            const avatar = type === 'bot' ? '🤖' : '👤';

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            if (type === 'bot') {
                messageDiv.innerHTML = `
                    <div class="message-wrap">
                        <div class="avatar">${avatar}</div>
                        <div class="message-content">${escapeHtml(text)}</div>
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="message-wrap">
                        <div class="message-content">${escapeHtml(text)}</div>
                        <div class="avatar">${avatar}</div>
                    </div>
                `;
            }

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // 显示加载状态
        function showLoading() {
            const chatArea = document.getElementById('chatArea');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot';
            loadingDiv.id = 'loadingMessage';
            loadingDiv.innerHTML = `
                <div class="message-wrap">
                    <div class="avatar">🤖</div>
                    <div class="message-content">
                        <div class="loading">
                            <div class="loading-dots">
                                <span></span><span></span><span></span>
                            </div>
                            ${i18n.get('loading')}
                        </div>
                    </div>
                </div>
            `;
            chatArea.appendChild(loadingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // 移除加载状态
        function removeLoading() {
            const loading = document.getElementById('loadingMessage');
            if (loading) loading.remove();
        }

        // 更新状态
        function updateStatus(authenticated, name) {
            const badge = document.getElementById('statusBadge');
            if (authenticated) {
                badge.className = 'status-badge authenticated';
                badge.textContent = name ? i18n.get('nameAuthenticated').replace('{name}', name) : i18n.get('authenticatedMsg');
            } else {
                badge.className = 'status-badge unauthenticated';
                badge.textContent = i18n.get('unauthenticated');
            }
        }

        // 清除历史
        async function clearHistory() {
            if (sessionId) {
                try {
                    await fetch('/api/session/clear', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ session_id: sessionId })
                    });
                } catch (e) {}
            }

            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = `
                <div class="message bot">
                    <div class="message-wrap">
                        <div class="avatar">🤖</div>
                        <div class="message-content" id="welcomeMessage">
                            ${i18n.get('welcomeMessage')}
                        </div>
                    </div>
                </div>
            `;

            isAuthenticated = false;
            updateStatus(false);
            await createSession();
        }

        // 关闭弹窗
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
            document.getElementById('phoneInput').value = '';
            document.getElementById('codeInput').value = '';
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 切换语言
        function changeLanguage(lang) {
            i18n.set(lang);
            localStorage.setItem('crm_lang', lang);
        }

        // 加载保存的语言
        function loadSavedLanguage() {
            const savedLang = localStorage.getItem('crm_lang');
            if (savedLang && i18n.translations[savedLang]) {
                document.getElementById('langSelect').value = savedLang;
                i18n.currentLang = savedLang;
                i18n.updateUI();
            }
        }

        // 页面加载完成后初始化
        window.onload = function() {
            loadSavedLanguage();
            init();
        };
    </script>
</body>
</html>
